name: build-windows

on:
  workflow_dispatch:        # 手动触发
  push:
    tags: ['v*']            # 打 tag (如 v1.0) 自动构建

permissions:
  contents: write          # 发布 Release 需要写权限

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: 下载内置 yt-dlp / ffmpeg
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path bin | Out-Null
          Write-Host "下载 yt-dlp.exe ..."
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile bin/yt-dlp.exe
          Write-Host "下载 ffmpeg ..."
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile ffmpeg.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $d = (Get-ChildItem ffmpeg_extract -Recurse -Filter ffmpeg.exe | Select-Object -First 1).DirectoryName
          Copy-Item "$d/ffmpeg.exe"  bin/ffmpeg.exe  -Force
          Copy-Item "$d/ffprobe.exe" bin/ffprobe.exe -Force
          Get-ChildItem bin

      - name: 打包 exe
        run: pyinstaller desktop.spec --noconfirm

      - name: 上传产物 (Actions Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: TK-Backup-windows
          path: dist/TK-Backup.exe
          if-no-files-found: error

      - name: 发布 Release (仅打 tag 时)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/TK-Backup.exe
          name: TK 矩阵备份 ${{ github.ref_name }}
          body: |
            Windows 单文件版（内置 yt-dlp + ffmpeg，零安装）。
            下载下方 **TK-Backup.exe**，放进空文件夹双击即用。
